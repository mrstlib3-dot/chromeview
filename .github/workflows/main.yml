name: Build

on:
  workflow_dispatch:
  
permissions:
  contents: write
  
jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
    - name: Clone repository
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 1
    - name: Validation
      uses: gradle/actions/wrapper-validation@v6
      
    - name: Java setup
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
    - name: Gradle Permissioncrbuild
      run: ./crbuild/vm-setup.sh
